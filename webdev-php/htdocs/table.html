<!DOCTYPE html>
<html>
<head>
    <title>Contoh Tabel HTML</title>
</head>

<body>

<h1>Contoh Penggunaan Tag Tabel HTML</h1>

<table border="1" width="60%">

    <!-- Bagian Header Tabel -->
    <thead>
        <tr>
            <th>No</th>
            <th>Nama Mahasiswa</th>
            <th>Jurusan</th>
            <th>Nilai</th>
        </tr>
    </thead>

    <!-- Isi Data Tabel -->
    <tbody>
        <tr>
            <td>1</td>
            <td>Andi</td>
            <td>Informatika</td>
            <td>85</td>
        </tr>

        <tr>
            <td>2</td>
            <td>Budi</td>
            <td>Sistem Informasi</td>
            <td>90</td>
        </tr>

        <tr>
            <td>3</td>
            <td>Citra</td>
            <td>Teknik Komputer</td>
            <td>88</td>
        </tr>
    </tbody>

    <!-- Bagian Footer Tabel -->
    <tfoot>
        <tr>
            <td colspan="3"><b>Rata-rata Nilai</b></td>
            <td>87.6</td>
        </tr>
    </tfoot>

</table>

</body>
</html>
