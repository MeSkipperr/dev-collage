<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Latihan Perulangan I</title>
</head>
<body>

    <script>
        document.writeln("<h2>Latihan Perulangan For</h2>");
        document.writeln("<pre>");

        for (var i = 1; i <= 10; i++) {
            var sq = i * i;
            document.writeln("Angka: " + i + " ---> Kuadrat: " + sq);
        }

        document.writeln("</pre>");
    </script>

</body>
</html>
