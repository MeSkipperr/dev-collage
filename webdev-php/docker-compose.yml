version: '3.8'

services:

  apache:
    build: ./php
    container_name: webdev-php-apache
    ports:
      - "8080:80"
    volumes:
      - ./htdocs:/var/www/html
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: webdev-php-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: collage
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
    volumes:
      - ./mysql/data:/var/lib/mysql
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: webdev-php-phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306